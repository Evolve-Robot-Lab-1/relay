name = "agent-network"
main = "server.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# KV for persistent storage
kv_namespaces = [
  { binding = "AGENTS_KV", id = "86eb6452423b47de8bc1cf5767323457" }
]

# Workers AI for message processing
ai = { binding = "AI" }

routes = [
  { pattern = "relay.durgaai.com", custom_domain = true }
]

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

[[durable_objects.bindings]]
name = "RELAY_STORE"
class_name = "RelayStore"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RelayStore"]
